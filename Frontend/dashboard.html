<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body { margin:0; font-family:Arial; background:#f0ede8; }
.container { display:flex; height:100vh; }

/* sidebar */
.sidebar { width:260px; background:#bfbfbf; padding:20px; box-sizing:border-box; display:flex; flex-direction:column; }
.profile { text-align:center; margin-bottom:20px; }
.profile-circle {
    width:80px; height:80px; border-radius:50%;
    background:#ddd; margin:auto;
    object-fit:cover; cursor:pointer;
    border:2px solid #aaa;
    display:block;
}
.name { margin-top:10px; font-weight:bold; }
.upload-hint { font-size:11px; color:#666; margin-top:4px; }
.menu { background:white; padding:10px; border-radius:6px; margin-top:10px; }
.menu h4 { margin:0; background:#777; color:white; padding:5px; border-radius:6px; font-size:14px; }
.menu ul { list-style:none; padding:10px; margin:0; }
.menu li { margin:4px 0; font-size:13px; }
.menu li.label { font-weight:bold; color:#555; margin-top:8px; }
.menu li.value { color:#222; padding-left:4px; border-left:3px solid #ddd; margin-left:2px; }
.logout { margin-top:auto; background:#888; color:white; border:none; width:100%; padding:8px; border-radius:20px; cursor:pointer; }

/* main */
.main { flex:1; padding:40px; }
.card { background:white; padding:20px; border-radius:6px; max-width:500px; }
.row { display:flex; gap:20px; margin-bottom:16px; }
.field { display:flex; flex-direction:column; gap:4px; }
label { font-size:14px; font-weight:bold; color:#555; }
input { padding:6px 10px; border:1px solid #ccc; border-radius:4px; background:#f9f9f9; min-width:180px; }
.btn-monthly { padding:8px 20px; background:#777; color:white; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="profile">
      <input type="file" id="uploadImg" accept="image/*" style="display:none" onchange="previewImage(this)">
      <img id="profileImg"
           src="https://ui-avatars.com/api/?name=User&background=cccccc&color=ffffff&size=80"
           class="profile-circle"
           onclick="document.getElementById('uploadImg').click()"
           title="คลิกเพื่อเปลี่ยนรูป">
      <div class="upload-hint">คลิกที่รูปเพื่อเปลี่ยน</div>
      <div class="name" id="info-fullname">Firstname Lastname</div>
    </div>

    <div class="menu">
      <h4>Employee Information</h4>
      <ul>
        <li class="label">Firstname Lastname</li>
        <li class="value" id="side-name">-</li>
        <li class="label">Dept</li>
        <li class="value" id="side-dept">-</li>
        <li class="label">Workdate</li>
        <li class="value" id="side-date">-</li>
        <li class="label">CheckIn</li>
        <li class="value" id="side-checkin">-</li>
        <li class="label">CheckOut</li>
        <li class="value" id="side-checkout">-</li>
      </ul>
    </div>

    <button class="logout" onclick="handleLogout()">Log-Out</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">
      <div class="row">
        <div class="field">
          <label>CheckIn</label>
          <input type="text" id="d-checkin" readonly>
        </div>
        <div class="field">
          <label>CheckOut</label>
          <input type="text" id="d-checkout" readonly>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Workdate</label>
          <input type="text" id="info-date" readonly style="min-width:300px;">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>OT Hour</label>
          <input type="text" id="d-ot" readonly>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Total Pay</label>
          <input type="text" id="d-salary" readonly>
        </div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <button onclick="goToMonthly()" class="btn-monthly">รายงานรายเดือน</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/script.js"></script>
<script>
  function goToMonthly() {
    window.location.href = "monthly.html";
  }

  function handleLogout() {
    localStorage.clear();
    window.location.href = "index.html";
  }
</script>

</body>
</html>
