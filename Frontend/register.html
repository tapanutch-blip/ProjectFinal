<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page active">
  <div class="card">
    <h2>Registration Form</h2>

    <div id="message" class="alert"></div>

    <div class="field">
      <label>Firstname</label>
      <input type="text" id="reg-first" placeholder="ชื่อ">
    </div>

    <div class="field">
      <label>Lastname</label>
      <input type="text" id="reg-last" placeholder="นามสกุล">
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="reg-user" placeholder="Username">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="name@email.com">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Password">
    </div>

    <button onclick="doRegister()">Sign Up</button>

    <div class="link-row">
      or 
      <a href="signin.html">Sign In</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/script.js"></script>
</body>
</html>
